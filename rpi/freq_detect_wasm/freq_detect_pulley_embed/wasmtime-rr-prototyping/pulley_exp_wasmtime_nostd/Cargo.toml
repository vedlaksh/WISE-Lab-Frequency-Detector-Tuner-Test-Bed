[package]
name = "pulley_exp_wasmtime_nostd"
version = "0.1.0"
edition = "2021"

[lib]
name = "pulley_exp_wasmtime_nostd"
crate-type = ["staticlib"]  # <--- THIS IS THE KEY LINE

# [build]
# target = "riscv32imac-unknown-none-elf"

# [target.riscv32imac-unknown-none-elf]
