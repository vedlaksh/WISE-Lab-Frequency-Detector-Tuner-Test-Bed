#   "-C", "link-arg=-W1,-Map=/home/jerryfen/zephyrproject/zephyr/apps/wasmtime-rr-prototyping/link.map",
# ]

[features]
default = []
alloc = []
rr = [
  "wasmtime/rr"
]

# [dependencies]
# spin = "0.10.0"
# talc = { version = "4.4.3", default-features = false, features = ["lock_api", "counters"] }
# itoa = { version = "1", default-features = false }

[dependencies.wasmtime]
path = "../crates/wasmtime"
default-features = false
features = [
    "runtime",
    "component-model",
    "pulley",
    # "cranelift",
    # "gc-null",
]


[profile.release]
panic = "abort"
